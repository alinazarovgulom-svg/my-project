<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFE566"/>
      <stop offset="50%" style="stop-color:#F5C518"/>
      <stop offset="100%" style="stop-color:#B8860B"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>

  <!-- Dollar sign (large, left-center) -->
  <text x="68" y="335" font-family="Georgia, 'Times New Roman', serif" font-size="320" font-weight="bold" fill="url(#gold)">$</text>

  <!-- BEK text (bottom right) -->
  <text x="262" y="415" font-family="'Arial Black', Arial, sans-serif" font-size="110" font-weight="900" fill="url(#gold)" letter-spacing="4">BEK</text>

  <!-- Decorative line above BEK -->
  <rect x="262" y="318" width="218" height="4" rx="2" fill="url(#gold)" opacity="0.6"/>
</svg>
