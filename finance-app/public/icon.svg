<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>

  <!-- Crown (BEK — sohibi, rahbar) -->
  <path d="M 158,238 L 158,200 L 210,138 L 256,178 L 302,138 L 354,200 L 354,238 Z"
        fill="white" opacity="1"/>

  <!-- Crown base bar -->
  <rect x="152" y="228" width="208" height="32" rx="10" fill="white"/>

  <!-- Coin (PUL — pul, boylik) -->
  <circle cx="256" cy="354" r="92" fill="none" stroke="white" stroke-width="20"/>

  <!-- Two lines inside coin — banknote/value symbol -->
  <line x1="216" y1="338" x2="296" y2="338" stroke="white" stroke-width="16" stroke-linecap="round"/>
  <line x1="216" y1="370" x2="296" y2="370" stroke="white" stroke-width="16" stroke-linecap="round"/>
</svg>
