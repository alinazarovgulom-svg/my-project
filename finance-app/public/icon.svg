<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Background gradient - deep dark -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="50%" stop-color="#16213e"/>
      <stop offset="100%" stop-color="#0f0f1a"/>
    </linearGradient>

    <!-- 3D Gold gradient - light top, dark bottom for emboss -->
    <linearGradient id="gold3d" x1="0%" y1="0%" x2="20%" y2="100%">
      <stop offset="0%"   stop-color="#FFF5A0"/>
      <stop offset="20%"  stop-color="#FFD700"/>
      <stop offset="45%"  stop-color="#F5C518"/>
      <stop offset="70%"  stop-color="#C8960C"/>
      <stop offset="100%" stop-color="#7B5800"/>
    </linearGradient>

    <!-- Highlight shimmer -->
    <linearGradient id="shine" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%"   stop-color="#FFFDE0" stop-opacity="0.9"/>
      <stop offset="40%"  stop-color="#FFD700" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#7B5800" stop-opacity="0"/>
    </linearGradient>

    <!-- Inner glow filter -->
    <filter id="emboss" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur"/>
      <feOffset dx="3" dy="5" result="shadow"/>
      <feFlood flood-color="#000000" flood-opacity="0.7" result="color"/>
      <feComposite in="color" in2="shadow" operator="in" result="coloredShadow"/>
      <feMerge>
        <feMergeNode in="coloredShadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="innershadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4" result="blur"/>
      <feOffset dx="-2" dy="-3" result="offsetBlur"/>
      <feFlood flood-color="#FFF5A0" flood-opacity="0.5" result="light"/>
      <feComposite in="light" in2="offsetBlur" operator="in" result="lightEffect"/>
      <feMerge>
        <feMergeNode in="SourceGraphic"/>
        <feMergeNode in="lightEffect"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>

  <!-- Subtle radial glow behind content -->
  <radialGradient id="bgGlow" cx="45%" cy="50%" r="50%">
    <stop offset="0%"   stop-color="#C8960C" stop-opacity="0.12"/>
    <stop offset="100%" stop-color="#C8960C" stop-opacity="0"/>
  </radialGradient>
  <rect width="512" height="512" rx="100" fill="url(#bgGlow)"/>

  <!-- === DOLLAR SIGN === -->
  <!-- Shadow layer (dark offset = depth) -->
  <text x="74" y="342" font-family="Georgia, 'Times New Roman', serif"
        font-size="310" font-weight="bold" fill="#3D2200" opacity="0.9">$</text>

  <!-- Mid layer (warm gold) -->
  <text x="70" y="338" font-family="Georgia, 'Times New Roman', serif"
        font-size="310" font-weight="bold" fill="#C8960C">$</text>

  <!-- Main gold layer -->
  <text x="68" y="336" font-family="Georgia, 'Times New Roman', serif"
        font-size="310" font-weight="bold" fill="url(#gold3d)" filter="url(#emboss)">$</text>

  <!-- Highlight layer (top-left shimmer) -->
  <text x="68" y="336" font-family="Georgia, 'Times New Roman', serif"
        font-size="310" font-weight="bold" fill="url(#shine)" opacity="0.7">$</text>

  <!-- === DIVIDER LINE === -->
  <rect x="258" y="315" width="222" height="5" rx="2.5" fill="url(#gold3d)" opacity="0.6"/>
  <rect x="258" y="315" width="222" height="2" rx="1" fill="#FFF5A0" opacity="0.4"/>

  <!-- === BEK TEXT === -->
  <!-- Shadow -->
  <text x="264" y="422" font-family="'Arial Black', 'Impact', sans-serif"
        font-size="112" font-weight="900" fill="#3D2200" opacity="0.9" letter-spacing="5">BEK</text>

  <!-- Mid layer -->
  <text x="261" y="419" font-family="'Arial Black', 'Impact', sans-serif"
        font-size="112" font-weight="900" fill="#C8960C" letter-spacing="5">BEK</text>

  <!-- Main gold -->
  <text x="259" y="417" font-family="'Arial Black', 'Impact', sans-serif"
        font-size="112" font-weight="900" fill="url(#gold3d)" letter-spacing="5" filter="url(#emboss)">BEK</text>

  <!-- Highlight -->
  <text x="259" y="417" font-family="'Arial Black', 'Impact', sans-serif"
        font-size="112" font-weight="900" fill="url(#shine)" letter-spacing="5" opacity="0.6">BEK</text>
</svg>
