<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
    <linearGradient id="ic" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Glow -->
  <circle cx="256" cy="240" r="120" fill="#3b82f6" opacity="0.12"/>

  <!-- P vertical bar -->
  <rect x="168" y="136" width="44" height="240" rx="22" fill="url(#ic)" filter="url(#glow)"/>

  <!-- P bowl -->
  <path d="M212 136 Q320 136 320 208 Q320 280 212 280 L212 244 Q276 244 276 208 Q276 172 212 172 Z" fill="url(#ic)" filter="url(#glow)"/>

  <!-- Gold dot -->
  <circle cx="348" cy="152" r="20" fill="#ffd700" opacity="0.95"/>
</svg>
