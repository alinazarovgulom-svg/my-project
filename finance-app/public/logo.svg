<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFE566"/>
      <stop offset="50%" style="stop-color:#F5C518"/>
      <stop offset="100%" style="stop-color:#B8860B"/>
    </linearGradient>
  </defs>

  <!-- Dollar sign -->
  <text x="4" y="68" font-family="Georgia, 'Times New Roman', serif" font-size="76" font-weight="bold" fill="url(#gold)">$</text>

  <!-- BEK text -->
  <text x="68" y="60" font-family="'Arial Black', Arial, sans-serif" font-size="52" font-weight="900" fill="url(#gold)" letter-spacing="3">BEK</text>

  <!-- Thin line under BEK -->
  <rect x="68" y="66" width="246" height="3" rx="1.5" fill="url(#gold)" opacity="0.5"/>
</svg>
