<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 420" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
    <linearGradient id="iconGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#b8860b"/>
      <stop offset="50%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#b8860b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Icon background -->
  <rect x="50" y="20" width="300" height="300" rx="64" fill="url(#bgGrad)" filter="url(#shadow)"/>

  <!-- Glow circle behind icon -->
  <circle cx="200" cy="170" r="80" fill="#3b82f6" opacity="0.12"/>

  <!-- P letter stylized -->
  <!-- Vertical bar -->
  <rect x="148" y="100" width="28" height="140" rx="14" fill="url(#iconGrad)" filter="url(#glow)"/>

  <!-- P top circle -->
  <path d="M176 100 Q248 100 248 148 Q248 196 176 196 L176 172 Q220 172 220 148 Q220 124 176 124 Z" fill="url(#iconGrad)" filter="url(#glow)"/>

  <!-- Decorative dot -->
  <circle cx="270" cy="108" r="12" fill="#ffd700" opacity="0.9"/>

  <!-- PULBEK text -->
  <text x="200" y="364" font-family="'Helvetica Neue', Arial, sans-serif" font-size="52" font-weight="900" text-anchor="middle" letter-spacing="8" fill="white">PULBEK</text>

  <!-- by KAFTIMDA text -->
  <text x="200" y="402" font-family="'Helvetica Neue', Arial, sans-serif" font-size="15" font-weight="600" text-anchor="middle" letter-spacing="3" fill="url(#goldGrad)">by KAFTIMDA</text>
</svg>
