<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Kalkulyator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    .phone {
      width: 360px;
      background: #1c1c1e;
      border-radius: 50px;
      padding: 12px;
      box-shadow:
        0 30px 80px rgba(0,0,0,0.6),
        inset 0 1px 0 rgba(255,255,255,0.1);
    }

    .screen-area {
      background: #000;
      border-radius: 40px;
      overflow: hidden;
      padding-bottom: 16px;
    }

    /* Status bar */
    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 28px 0;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
    }
    .status-icons { display: flex; gap: 6px; align-items: center; }
    .status-icons svg { width: 16px; height: 16px; fill: white; }

    /* Display */
    .display {
      padding: 20px 28px 12px;
      text-align: right;
      min-height: 140px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
    }
    .expression {
      font-size: 20px;
      color: #888;
      min-height: 28px;
      margin-bottom: 4px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .result {
      font-size: 64px;
      color: #fff;
      font-weight: 300;
      line-height: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      transition: font-size 0.15s;
    }
    .result.small { font-size: 42px; }

    /* Buttons grid */
    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      padding: 8px 16px 8px;
    }

    .btn {
      height: 76px;
      border: none;
      border-radius: 50%;
      font-size: 28px;
      font-weight: 400;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.1s, transform 0.08s;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .btn:active { opacity: 0.7; transform: scale(0.94); }

    /* Button types */
    .btn-func  { background: #a5a5a5; color: #1c1c1e; }
    .btn-op    { background: #ff9f0a; color: #fff; }
    .btn-op.active { background: #fff; color: #ff9f0a; }
    .btn-num   { background: #333333; color: #fff; }
    .btn-zero  {
      grid-column: span 2;
      border-radius: 38px;
      justify-content: flex-start;
      padding-left: 28px;
      font-size: 28px;
    }

    /* Ripple feel via shadow */
    .btn-num:hover  { background: #4a4a4a; }
    .btn-func:hover { background: #c0c0c0; }
    .btn-op:hover   { background: #ffb340; }

    /* Home indicator */
    .home-bar {
      width: 130px;
      height: 5px;
      background: rgba(255,255,255,0.3);
      border-radius: 3px;
      margin: 8px auto 0;
    }
  </style>
</head>
<body>

<div class="phone">
  <div class="screen-area">

    <!-- Status bar -->
    <div class="status-bar">
      <span id="clock">9:41</span>
      <div class="status-icons">
        <!-- Signal -->
        <svg viewBox="0 0 24 24"><rect x="1" y="14" width="4" height="8"/><rect x="7" y="10" width="4" height="12"/><rect x="13" y="6" width="4" height="16"/><rect x="19" y="2" width="4" height="20"/></svg>
        <!-- WiFi -->
        <svg viewBox="0 0 24 24"><path d="M1.5 8.5C5.2 4.8 10.4 2.5 12 2.5s6.8 2.3 10.5 6l-2.1 2.1C17.6 7.8 14.9 6 12 6s-5.6 1.8-8.4 4.6L1.5 8.5zm4.2 4.2C7.4 10.9 9.6 9.5 12 9.5s4.6 1.4 6.3 3.2l-2.1 2.1C15 13.6 13.6 12.5 12 12.5s-3 1.1-4.2 2.3l-2.1-2.1zm4.2 4.2c.6-.6 1.3-1 2.1-1s1.5.4 2.1 1L12 19l-2.1-2.1z"/></svg>
        <!-- Battery -->
        <svg viewBox="0 0 24 24"><rect x="1" y="7" width="18" height="10" rx="2" stroke="white" stroke-width="1.5" fill="none"/><rect x="3" y="9" width="12" height="6" rx="1" fill="white"/><path d="M20 10v4" stroke="white" stroke-width="2" stroke-linecap="round"/></svg>
      </div>
    </div>

    <!-- Display -->
    <div class="display">
      <div class="expression" id="expression"></div>
      <div class="result" id="result">0</div>
    </div>

    <!-- Buttons -->
    <div class="buttons">
      <!-- Row 1 -->
      <button class="btn btn-func" data-action="clear">AC</button>
      <button class="btn btn-func" data-action="sign">+/-</button>
      <button class="btn btn-func" data-action="percent">%</button>
      <button class="btn btn-op"   data-action="op" data-op="÷">÷</button>

      <!-- Row 2 -->
      <button class="btn btn-num" data-action="num" data-val="7">7</button>
      <button class="btn btn-num" data-action="num" data-val="8">8</button>
      <button class="btn btn-num" data-action="num" data-val="9">9</button>
      <button class="btn btn-op"  data-action="op"  data-op="×">×</button>

      <!-- Row 3 -->
      <button class="btn btn-num" data-action="num" data-val="4">4</button>
      <button class="btn btn-num" data-action="num" data-val="5">5</button>
      <button class="btn btn-num" data-action="num" data-val="6">6</button>
      <button class="btn btn-op"  data-action="op"  data-op="−">−</button>

      <!-- Row 4 -->
      <button class="btn btn-num" data-action="num" data-val="1">1</button>
      <button class="btn btn-num" data-action="num" data-val="2">2</button>
      <button class="btn btn-num" data-action="num" data-val="3">3</button>
      <button class="btn btn-op"  data-action="op"  data-op="+">+</button>

      <!-- Row 5 -->
      <button class="btn btn-num btn-zero" data-action="num" data-val="0">0</button>
      <button class="btn btn-num" data-action="dot">.</button>
      <button class="btn btn-op"  data-action="equals">=</button>
    </div>

    <div class="home-bar"></div>
  </div>
</div>

<script>
  // Clock
  function updateClock() {
    const now = new Date();
    const h = now.getHours().toString().padStart(2,'0');
    const m = now.getMinutes().toString().padStart(2,'0');
    document.getElementById('clock').textContent = h + ':' + m;
  }
  updateClock();
  setInterval(updateClock, 10000);

  // Calculator state
  let current = '0';
  let prev = null;
  let operator = null;
  let shouldReset = false;
  let expressionStr = '';

  const resultEl = document.getElementById('result');
  const exprEl   = document.getElementById('expression');

  function updateDisplay(val) {
    const s = String(val);
    resultEl.textContent = formatNumber(s);
    resultEl.className = 'result' + (s.length > 9 ? ' small' : '');
  }

  function formatNumber(s) {
    if (s === 'Xato') return 'Xato';
    const parts = s.split('.');
    parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ',');
    return parts.join('.');
  }

  function calc(a, op, b) {
    a = parseFloat(a); b = parseFloat(b);
    switch(op) {
      case '+': return a + b;
      case '−': return a - b;
      case '×': return a * b;
      case '÷': return b === 0 ? 'Xato' : a / b;
    }
  }

  function smartStr(n) {
    if (typeof n !== 'number') return String(n);
    const s = parseFloat(n.toPrecision(12)).toString();
    return s;
  }

  document.querySelector('.buttons').addEventListener('click', e => {
    const btn = e.target.closest('.btn');
    if (!btn) return;
    const action = btn.dataset.action;

    if (action === 'num') {
      const v = btn.dataset.val;
      if (shouldReset) { current = v; shouldReset = false; }
      else current = current === '0' ? v : current + v;
      if (current.length > 12) return;
      updateDisplay(current);
    }

    else if (action === 'dot') {
      if (shouldReset) { current = '0.'; shouldReset = false; }
      else if (!current.includes('.')) current += '.';
      updateDisplay(current);
    }

    else if (action === 'clear') {
      current = '0'; prev = null; operator = null;
      shouldReset = false; expressionStr = '';
      exprEl.textContent = '';
      updateDisplay('0');
      document.querySelectorAll('.btn-op').forEach(b => b.classList.remove('active'));
      btn.textContent = 'AC';
    }

    else if (action === 'sign') {
      current = smartStr(-parseFloat(current));
      updateDisplay(current);
    }

    else if (action === 'percent') {
      current = smartStr(parseFloat(current) / 100);
      updateDisplay(current);
    }

    else if (action === 'op') {
      const op = btn.dataset.op;
      if (operator && !shouldReset) {
        const res = calc(prev, operator, current);
        current = smartStr(res);
        updateDisplay(current);
      }
      prev = current;
      operator = op;
      shouldReset = true;
      expressionStr = formatNumber(prev) + ' ' + op;
      exprEl.textContent = expressionStr;
      document.querySelectorAll('.btn-op').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }

    else if (action === 'equals') {
      if (!operator) return;
      const b = current;
      const res = calc(prev, operator, b);
      exprEl.textContent = formatNumber(prev) + ' ' + operator + ' ' + formatNumber(b) + ' =';
      current = smartStr(res);
      updateDisplay(current);
      prev = null; operator = null; shouldReset = true;
      document.querySelectorAll('.btn-op').forEach(b => b.classList.remove('active'));
    }

    // Update AC/C
    const clearBtn = document.querySelector('[data-action="clear"]');
    if (action !== 'clear') clearBtn.textContent = current !== '0' ? 'C' : 'AC';
  });
</script>
</body>
</html>
