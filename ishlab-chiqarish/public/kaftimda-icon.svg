<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a" />
      <stop offset="100%" style="stop-color:#2563eb" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" rx="20" fill="url(#bg)" />

  <!-- Factory building -->
  <rect x="18" y="52" width="64" height="36" rx="3" fill="white" fill-opacity="0.92" />

  <!-- Factory roof panels -->
  <rect x="22" y="38" width="20" height="16" rx="2" fill="#60a5fa" />
  <rect x="58" y="38" width="20" height="16" rx="2" fill="#60a5fa" />

  <!-- Chimneys -->
  <rect x="27" y="26" width="8" height="14" rx="2" fill="#93c5fd" />
  <rect x="63" y="26" width="8" height="14" rx="2" fill="#93c5fd" />

  <!-- Smoke -->
  <circle cx="31" cy="21" r="3.5" fill="#bfdbfe" fill-opacity="0.65" />
  <circle cx="33" cy="14" r="2.5" fill="#bfdbfe" fill-opacity="0.4" />
  <circle cx="67" cy="21" r="3.5" fill="#bfdbfe" fill-opacity="0.65" />
  <circle cx="69" cy="14" r="2.5" fill="#bfdbfe" fill-opacity="0.4" />

  <!-- Door -->
  <rect x="42" y="64" width="14" height="24" rx="2" fill="#1d4ed8" fill-opacity="0.45" />

  <!-- Windows -->
  <rect x="22" y="62" width="12" height="9" rx="1.5" fill="#3b82f6" fill-opacity="0.7" />
  <rect x="22" y="75" width="12" height="9" rx="1.5" fill="#3b82f6" fill-opacity="0.7" />
  <rect x="64" y="62" width="12" height="9" rx="1.5" fill="#3b82f6" fill-opacity="0.7" />
  <rect x="64" y="75" width="12" height="9" rx="1.5" fill="#3b82f6" fill-opacity="0.7" />

  <!-- K letter overlay (subtle) -->
  <!-- small "K" badge bottom-right -->
  <rect x="66" y="4" width="28" height="28" rx="7" fill="white" fill-opacity="0.15" />
  <text x="70" y="24" font-family="'Segoe UI', Arial, sans-serif" font-size="18" font-weight="900" fill="white">K</text>
</svg>
