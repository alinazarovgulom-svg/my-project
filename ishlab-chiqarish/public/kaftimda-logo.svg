<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 128" width="460" height="128">

  <!-- ══ ICON BOX ══ -->
  <rect x="10" y="10" width="108" height="108" rx="20" fill="#0B1437"/>

  <!-- ── HAND: 5 fingers + palm (geometric, flat) ── -->
  <!-- Pinky (shortest, leftmost) -->
  <rect x="38" y="30" width="9" height="30" rx="4.5" fill="white"/>
  <!-- Ring -->
  <rect x="49" y="23" width="9" height="37" rx="4.5" fill="white"/>
  <!-- Middle (tallest) -->
  <rect x="60" y="19" width="9" height="41" rx="4.5" fill="white"/>
  <!-- Index -->
  <rect x="71" y="23" width="9" height="37" rx="4.5" fill="white"/>
  <!-- Thumb (shorter, right side, lower start) -->
  <rect x="82" y="38" width="9" height="24" rx="4.5" fill="white"/>

  <!-- Palm base -->
  <rect x="36" y="57" width="58" height="30" rx="9" fill="white"/>

  <!-- ── FACTORY inside the palm (amber) ── -->
  <!-- Chimneys -->
  <rect x="49" y="56" width="6" height="9" rx="1.5" fill="#D97706"/>
  <rect x="63" y="56" width="6" height="9" rx="1.5" fill="#D97706"/>
  <!-- Main building -->
  <rect x="43" y="63" width="36" height="18" rx="2.5" fill="#D97706"/>
  <!-- Door -->
  <rect x="57" y="69" width="7" height="12" rx="1" fill="#0B1437"/>
  <!-- Windows -->
  <rect x="46" y="66" width="8" height="7" rx="1" fill="rgba(255,255,255,0.28)"/>
  <rect x="69" y="66" width="8" height="7" rx="1" fill="rgba(255,255,255,0.28)"/>

  <!-- ══ TYPOGRAPHY ══ -->

  <!-- Brand name -->
  <text
    x="132" y="57"
    font-family="'Segoe UI', 'Arial Black', Arial, sans-serif"
    font-size="42"
    font-weight="900"
    fill="#0B1437"
    letter-spacing="-1">KAFTIMDA</text>

  <!-- Amber accent line -->
  <rect x="132" y="65" width="308" height="2.5" rx="1.5" fill="#D97706"/>

  <!-- Tagline -->
  <text
    x="134" y="85"
    font-family="'Segoe UI', Arial, sans-serif"
    font-size="14"
    font-weight="400"
    fill="#334155"
    letter-spacing="0.3">Biznesingiz kaftingizda</text>

  <!-- Product type -->
  <text
    x="135" y="106"
    font-family="'Segoe UI', Arial, sans-serif"
    font-size="9.5"
    fill="#94a3b8"
    letter-spacing="3">ISHLAB CHIQARISH TIZIMI</text>

</svg>
