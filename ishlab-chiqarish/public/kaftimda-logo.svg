<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 100" width="320" height="100">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#93c5fd;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background pill -->
  <rect x="0" y="0" width="320" height="100" rx="16" ry="16" fill="url(#bgGrad)" />

  <!-- Icon box -->
  <rect x="12" y="12" width="76" height="76" rx="12" ry="12" fill="white" fill-opacity="0.12" />

  <!-- Factory building icon -->
  <!-- Main building -->
  <rect x="24" y="46" width="52" height="32" rx="2" fill="white" fill-opacity="0.9" />
  <!-- Roof / top structure -->
  <rect x="28" y="36" width="16" height="12" rx="1" fill="url(#iconGrad)" />
  <rect x="50" y="36" width="16" height="12" rx="1" fill="url(#iconGrad)" />
  <!-- Chimneys -->
  <rect x="31" y="28" width="6" height="10" rx="1" fill="#93c5fd" />
  <rect x="53" y="28" width="6" height="10" rx="1" fill="#93c5fd" />
  <!-- Smoke dots -->
  <circle cx="34" cy="24" r="2.5" fill="#bfdbfe" fill-opacity="0.7" />
  <circle cx="36" cy="19" r="1.8" fill="#bfdbfe" fill-opacity="0.5" />
  <circle cx="56" cy="24" r="2.5" fill="#bfdbfe" fill-opacity="0.7" />
  <circle cx="58" cy="19" r="1.8" fill="#bfdbfe" fill-opacity="0.5" />
  <!-- Door -->
  <rect x="36" y="58" width="10" height="20" rx="1" fill="#1e40af" fill-opacity="0.5" />
  <!-- Windows -->
  <rect x="52" y="56" width="8" height="7" rx="1" fill="#60a5fa" fill-opacity="0.8" />
  <rect x="52" y="67" width="8" height="7" rx="1" fill="#60a5fa" fill-opacity="0.8" />
  <!-- Ground line -->
  <rect x="14" y="78" width="72" height="2" rx="1" fill="white" fill-opacity="0.2" />

  <!-- Palm (kaft) accent - subtle lines below chimneys suggesting hand -->
  <!-- Gear accent -->
  <circle cx="72" cy="36" r="6" fill="none" stroke="#60a5fa" stroke-width="1.5" stroke-opacity="0.6" />
  <circle cx="72" cy="36" r="3" fill="#60a5fa" fill-opacity="0.5" />

  <!-- KAFTIMDA text -->
  <text x="102" y="46" font-family="'Segoe UI', Arial, sans-serif" font-size="26" font-weight="800" fill="white" letter-spacing="1">KAFTIMDA</text>

  <!-- Tagline -->
  <text x="103" y="65" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="400" fill="#93c5fd" letter-spacing="2">ISHLAB CHIQARISH</text>

  <!-- Thin accent line -->
  <rect x="103" y="70" width="180" height="1.5" rx="1" fill="#3b82f6" fill-opacity="0.5" />

  <!-- Sub tagline -->
  <text x="103" y="83" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#bfdbfe" letter-spacing="0.5" fill-opacity="0.8">Ishlab chiqarishni nazorat qiling</text>
</svg>
